services:
  headscale:
    image: headscale/headscale:0.28.0
    restart: unless-stopped
    command: serve
    volumes:
      - ./config.yaml:/etc/headscale/config.yaml:ro
      - ./acl.json:/etc/headscale/acl.json:ro
      - headscale-data:/var/lib/headscale
    environment:
      - TZ=Asia/Makassar
    expose:
      - "8080"

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    depends_on:
      - headscale
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN:?}

volumes:
  headscale-data:
