services:
  headscale:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - headscale-data:/var/lib/headscale
    ports:
      - "127.0.0.1:18080:8080" # hanya untuk diakses cloudflared terpisah di host yang sama
    environment:
      - TZ=Asia/Makassar

volumes:
  headscale-data:
