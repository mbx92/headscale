services:
  headscale:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - headscale-data:/var/lib/headscale
    ports:
      - "10.100.10.6:18080:8080" # hanya untuk diakses reverse proxy di 10.100.10.10
    environment:
      - TZ=Asia/Makassar

volumes:
  headscale-data:
